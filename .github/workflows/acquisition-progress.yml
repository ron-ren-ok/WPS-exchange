name: Acquisition progress

on:
  schedule:
    # 10:10 Beijing time (02:10 UTC), every day.
    - cron: "10 2 * * *"
  workflow_dispatch:
    inputs:
      webhook_target:
        description: "Webhook target"
        required: true
        default: test
        type: choice
        options: [test, production]

permissions:
  contents: read

jobs:
  send-acquisition-progress:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: acquisition-progress
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: acquisition-progress/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Prepare progress content
        env:
          GOOGLE_SHEET_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SHEET_SERVICE_ACCOUNT_JSON }}
        run: python scripts/send_acquisition_progress.py --output "$RUNNER_TEMP/acquisition-progress.md"
      - name: Send WPS acquisition progress card
        shell: pwsh
        env:
          WPS_WEBHOOK_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.webhook_target == 'test' && secrets.WPS_WEBHOOK_URL_TEST || secrets.WPS_WEBHOOK_ACQUISITION }}
        run: |
          $cardText = Get-Content -LiteralPath "$env:RUNNER_TEMP/acquisition-progress.md" -Raw -Encoding utf8
          $beijingDate = [DateTime]::UtcNow.AddHours(8).ToString('yyyy-MM-dd')
          ./scripts/send-wps-webhook.ps1 -CardTitle '📣导量、三方、Affiliate KPI播报' -CardSubtitle $beijingDate -CardText $cardText -WebhookUrl $env:WPS_WEBHOOK_URL
