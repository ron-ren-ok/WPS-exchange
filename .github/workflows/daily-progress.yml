name: WPS daily progress

on:
  schedule:
    # 07:00 Beijing time (23:00 UTC on the preceding day), every day.
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-daily-progress:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daily-progress
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: daily-progress/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Prepare daily progress content
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/send_daily_progress.py --output "$RUNNER_TEMP/wps-daily-progress.md"
      - name: Send WPS daily progress card
        shell: pwsh
        env:
          WPS_WEBHOOK_URL: ${{ secrets.WPS_WEBHOOK_URL }}
          WPS_WEBHOOK_KEY: ${{ secrets.WPS_WEBHOOK_KEY }}
          WPS_WEBHOOK_SECRET: ${{ secrets.WPS_WEBHOOK_SECRET }}
        run: |
          $cardText = Get-Content -LiteralPath "$env:RUNNER_TEMP/wps-daily-progress.md" -Raw -Encoding utf8
          $beijingDate = [DateTime]::UtcNow.AddHours(8).ToString('yyyy-MM-dd')
          ./scripts/send-wps-webhook.ps1 -CardTitle '日血量进度播报' -CardSubtitle $beijingDate -CardText $cardText -WebhookUrl $env:WPS_WEBHOOK_URL