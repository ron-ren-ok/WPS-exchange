name: WPS daily progress

on:
  schedule:
    # 07:00 Beijing time (23:00 UTC on the preceding day), every day.
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      webhook_target:
        description: "Webhook target (test is the default during validation)"
        required: true
        default: test
        type: choice
        options:
          - test
          - production

permissions:
  contents: read

jobs:
  send-daily-progress:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daily-progress
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: daily-progress/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Prepare daily progress and forecast content
        env:
          GOOGLE_SHEET_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SHEET_SERVICE_ACCOUNT_JSON }}
        run: >-
          python scripts/send_daily_progress.py
          --output "$RUNNER_TEMP/wps-daily-progress.md"
          --forecast-output "$RUNNER_TEMP/wps-monthly-forecast.md"
      - name: Send WPS daily progress cards
        shell: pwsh
        env:
          WPS_WEBHOOK_URL: ${{ inputs.webhook_target == 'production' && secrets.WPS_WEBHOOK_URL || secrets.WPS_WEBHOOK_URL_TEST }}
          WPS_WEBHOOK_KEY: ${{ secrets.WPS_WEBHOOK_KEY }}
          WPS_WEBHOOK_SECRET: ${{ secrets.WPS_WEBHOOK_SECRET }}
        run: |
          $cardText = Get-Content -LiteralPath "$env:RUNNER_TEMP/wps-daily-progress.md" -Raw -Encoding utf8
          $beijingDate = [DateTime]::UtcNow.AddHours(8).ToString('yyyy-MM-dd')
          ./scripts/send-wps-webhook.ps1 -CardTitle '📣日血量进度播报' -CardSubtitle $beijingDate -CardText $cardText -WebhookUrl $env:WPS_WEBHOOK_URL
          Start-Sleep -Seconds 2
          $forecastText = Get-Content -LiteralPath "$env:RUNNER_TEMP/wps-monthly-forecast.md" -Raw -Encoding utf8
          ./scripts/send-wps-webhook.ps1 -CardTitle '📣月目标进度完成预测' -CardSubtitle $beijingDate -CardText $forecastText -WebhookUrl $env:WPS_WEBHOOK_URL